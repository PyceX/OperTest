<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тестирование</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 id="header-title">Тестирование</h1>
            <select id="lang-switch" class="lang-select">
                <option value="ru">Русский</option>
                <option value="kz">Қазақша</option>
            </select>
        </header>

        <section id="screen-setup" class="screen">
            <label id="label-n" for="input-n">Количество вопросов (20-100):</label>
            <input type="number" id="input-n" min="20" max="100" value="20">
            <button id="btn-start" class="btn btn-primary">Начать тест</button>
        </section>

        <section id="screen-quiz" class="screen hidden">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text"></div>
            
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-container" class="options-container"></div>
            <button id="btn-next" class="btn btn-secondary" disabled>Далее</button>
        </section>

        <section id="screen-result" class="screen hidden">
            <h2 id="result-title">Результаты</h2>
            <p id="score-text" class="score-text"></p>
            <div id="errors-container" class="errors-container"></div>
            <button id="btn-restart" class="btn btn-primary mt-4">Начать заново</button>
        </section>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
