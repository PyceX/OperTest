<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тестирование</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 id="header-title">Тестирование</h1>
            <div class="header-controls">
                <button id="theme-toggle" class="icon-btn" aria-label="Смена темы">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button id="lang-toggle" class="lang-btn">RU</button>
            </div>
        </header>
        
        <section id="screen-mode-selection" class="screen">
            <div class="card compact-card">
                <h2 id="mode-title">Выберите режим</h2>
                <button id="btn-mode-theory" class="btn btn-primary mt-4">Теория (Тестирование)</button>
                <button id="btn-mode-practice" class="btn btn-secondary mt-4">Практическое задание</button>
            </div>
        </section>
        
        <section id="screen-practice-selection" class="screen hidden">
            <div class="card compact-card">
                <h2 id="practice-select-title">Выбор практического задания</h2>
                <button class="btn btn-primary mt-4 btn-practice-select" data-module="salnik">Смена сальниковой набивки СУСГ</button>
                <button class="btn btn-primary mt-4 btn-practice-select" data-module="manometer">Смена манометра</button>
                <button id="btn-back-to-mode" class="btn btn-secondary mt-4">Назад</button>
            </div>
        </section>
        
        <section id="screen-practice-task" class="screen hidden">
            <h2 id="practice-title" class="question-text"></h2>
            <div id="practice-list-container" class="options-container"></div>
            <button id="btn-to-practice-test" class="btn btn-primary mt-4" disabled>Перейти к тесту</button>
            <button id="btn-practice-exit" class="btn btn-secondary mt-4">Выйти</button>
        </section>
        
        <section id="screen-practice-test" class="screen hidden">
            <h2 id="practice-test-title" class="question-text"></h2>
            <p id="practice-test-instruction" class="text-muted mb-4"></p>
            <div id="practice-test-list-container" class="options-container"></div>
            <button id="btn-finish-practice-test" class="btn btn-primary mt-4" disabled>Завершить тест</button>
            <button id="btn-practice-test-exit" class="btn btn-secondary mt-4">Выйти</button>
        </section>

        <section id="screen-setup" class="screen hidden">
            <div class="dua-card">
                <h3 id="dua-title"></h3>
                <p id="dua-text"></p>
            </div>
            
            <label id="label-n" for="input-n">Количество вопросов (20-100):</label>
            <input type="number" id="input-n" min="20" max="100" value="20">
            <button id="btn-start" class="btn btn-primary">Начать тест</button>
        </section>

        <section id="screen-quiz" class="screen hidden">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text"></div>
            
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-container" class="options-container"></div>
            <button id="btn-next" class="btn btn-secondary" disabled>Далее</button>
        </section>

        <section id="screen-result" class="screen hidden">
            <h2 id="result-title">Результаты</h2>
            <p id="score-text" class="score-text"></p>
            <div id="errors-container" class="errors-container"></div>
            <button id="btn-restart" class="btn btn-primary mt-4">Начать заново</button>
        </section>
    </div>

    <script src="questions.js"></script>
    <script src="practice.js"></script>
    <script src="app.js"></script>
</body>
</html>
